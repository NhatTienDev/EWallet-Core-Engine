name: EWallet CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

defaults:
  run:
    working-directory: backend

jobs:
  build-and-test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.26.1

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('backend/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download Go modules
        run: go mod download

      - name: Sync vendor directory
        run: go mod vendor

      - name: Install tools
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1
          go install github.com/swaggo/swag/cmd/swag@v1.16.6

      - name: Generate SQL code
        run: sqlc generate

      - name: Generate Swagger docs
        run: |
          swag init -g cmd/api/main.go --parseDependency --parseInternal
          git diff --exit-code docs || (echo "Swagger docs are not up-to-date. Run swag init and commit changes." && exit 1)

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: v1.59.0
          args: run ./...

      - name: Check gofmt
        run: gofmt -l .

      - name: Run go vet
        run: go vet ./...

      - name: Run unit tests
        run: go test ./...

      - name: Build Docker image for production
        run: docker build --target prod -t ewallet-backend:ci .
