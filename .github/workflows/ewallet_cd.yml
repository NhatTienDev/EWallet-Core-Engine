name: EWallet CD pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

defaults:
  run:
    working-directory: backend

jobs:
  deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase Repository Owner
        run: |
          echo "REPO_OWNER=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_OWNER }}/ewallet-backend:latest
            ghcr.io/${{ env.REPO_OWNER }}/ewallet-backend:${{ github.sha }}
          target: prod
          platforms: linux/amd64

      - name: Output image reference
        run: |
          echo "Deployed image: ghcr.io/${{ env.REPO_OWNER }}/ewallet-backend:${{ github.sha }}"
