services:
  postgres_db:
    image: postgres:16-alpine
    container_name: ewallet_postgres_db_prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./database/migration/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    container_name: ewallet_app_prod
    env_file:
      - .env
    depends_on:
      postgres_db:
        condition: service_healthy
    ports:
      - "${BE_PORT}:8080"
    restart: always

volumes:
  postgres_data_prod:
