version: "2"
sql:
  - schema: "database/migration/"
    queries: "database/query/users.sql"
    engine: "postgresql"
    gen:
      go:
        package: "sqlc"
        out: "internal/user/infrastructure/sqlc"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: false

  - schema: "database/migration/"
    queries: "database/query/wallets.sql"
    engine: "postgresql"
    gen:
      go:
        package: "sqlc"
        out: "internal/wallet/infrastructure/sqlc"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: false